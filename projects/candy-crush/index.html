<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Candy Crush</title>
        <link rel="stylesheet" href="candy.css">
    </head>

    <body>
        <main id="game-container">
            <header class="game-header">
                <h1 class="game-title">🍬 Candy Crush</h1>
                <div class="game-stats">
                    <div class="stat-box score-display" aria-label="Current score">
                        <span class="stat-label">Score</span>
                        <span id="score" class="stat-value score-value" aria-live="polite">0</span>
                    </div>
                    <div class="stat-box target-display" aria-label="Target score">
                        <span class="stat-label">Target</span>
                        <span id="target" class="stat-value target-value">3000</span>
                    </div>
                    <div class="stat-box moves-display" aria-label="Moves remaining">
                        <span class="stat-label">Moves</span>
                        <span id="moves" class="stat-value moves-value">30</span>
                    </div>
                </div>
            </header>
            <div id="board" role="grid" aria-label="Candy Crush game board"></div>
            <div id="game-over" class="game-over-overlay hidden">
                <div class="game-over-content">
                    <h2 id="game-over-title">Game Over</h2>
                    <p class="final-score-text">Final Score: <span id="final-score">0</span></p>
                    <button id="play-again" class="play-again-btn">Play Again</button>
                </div>
            </div>
        </main>
        <script src="candy.js"></script>
    </body>
</html>

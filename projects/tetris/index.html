<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tetris 2.0 — a classic Tetris game with meme-textured pieces">
    <title>Tetris 2.0 By SO</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="main-container" role="application" aria-label="Tetris Game">
        <div class="left-panel">
            <div class="panel-box hold-box">
                <div class="panel-label">Hold</div>
                <canvas id="holdCanvas" width="120" height="120" aria-hidden="true"></canvas>
            </div>
            <div class="panel-box controls-box">
                <div class="panel-label">Controls</div>
                <ul class="controls-list">
                    <li><kbd>&larr;</kbd><kbd>&rarr;</kbd> Move</li>
                    <li><kbd>&darr;</kbd> Soft Drop</li>
                    <li><kbd>Space</kbd> Hard Drop</li>
                    <li><kbd>&uarr;</kbd> Rotate</li>
                    <li><kbd>C</kbd> Hold</li>
                    <li><kbd>P</kbd> Pause</li>
                    <li><kbd>R</kbd> Restart</li>
                </ul>
            </div>
        </div>

        <div class="center-panel">
            <div class="game-container">
                <canvas id="tetrisCanvas" aria-label="Tetris game board"></canvas>
                <div id="overlay" class="overlay hidden" aria-live="assertive">
                    <div class="overlay-content">
                        <div id="overlayTitle" class="overlay-title"></div>
                        <div id="overlayScore" class="overlay-score"></div>
                        <button id="overlayButton" class="overlay-button">Play Again</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-box next-box">
                <div class="panel-label">Next</div>
                <canvas id="nextCanvas" width="120" height="120" aria-hidden="true"></canvas>
            </div>
            <div class="panel-box stats-box">
                <div class="stat-row">
                    <span class="stat-label">Score</span>
                    <span id="score" class="stat-value" aria-live="polite">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Level</span>
                    <span id="level" class="stat-value" aria-live="polite">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Lines</span>
                    <span id="lines" class="stat-value" aria-live="polite">0</span>
                </div>
            </div>
            <div id="textureStatus" class="texture-status"></div>
        </div>
    </main>
    <noscript>
        <p style="color:#fff;text-align:center;margin-top:2rem;">JavaScript is required to play Tetris.</p>
    </noscript>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mines Play</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="top-bar">
  <div class="brand">
    <h1>MINES PLAY</h1>
  </div>
  <div class="balance-container">
    Balance: <span id="balance">1000</span> 💰
  </div>
</header>

<main class="main-area">
  <section class="controls">
    <label>Mines:
      <input id="minesInput" type="number" min="1" max="24" value="5">
    </label>
    <label>Bet:
      <input id="betInput" type="number" min="1" value="100">
    </label>
    <div class="quick-bets">
      <button id="maxBtn" class="btn outline">MAX</button>
      <button id="halfBtn" class="btn outline">HALF</button>
      <button id="randBtn" class="btn outline">RANDOM</button>
      <button id="cashoutBtn" class="btn secondary" disabled>Cashout 0 💎 (1.0x)</button>
    </div>
  </section>

  <section class="game-area">
    <div id="grid" class="grid"></div>
    <div id="percentage" class="percentage">1.0x</div>
  </section>

  <div id="floatingText" class="floating-text"></div>
  <div id="flashOverlay"></div>
  
  <!-- Authentication modal: shown on first visit or when logged out -->
  <div id="authModal" class="auth-modal" aria-hidden="true">
    <div class="auth-box">
      <h2 id="authTitle">Welcome</h2>
      <div class="auth-tabs">
        <button id="authLoginBtn" class="auth-tab active">Log in</button>
        <button id="authSignupBtn" class="auth-tab">Sign up</button>
      </div>
      <div class="auth-body">
        <div class="auth-field">
          <label>Username</label>
          <input id="authUsername" type="text" autocomplete="username">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input id="authPassword" type="password" autocomplete="current-password">
        </div>
        <div id="authError" class="auth-error" role="status" aria-live="polite"></div>
        <div class="auth-actions">
          <button id="authSubmit" class="btn secondary">Continue</button>
        </div>
      </div>
    </div>
  </div>

  <!-- User badge bottom-right -->
  <div id="userBadge" class="user-badge" aria-hidden="true"></div>
  
  <!-- Notification container -->
  <div id="notificationContainer" class="notification-container"></div>
  
  <!-- Analytics modal -->
  <div id="analyticsModal" class="auth-modal" aria-hidden="true">
    <div class="auth-box">
      <h2 id="analyticsTitle">Profile Analytics</h2>
      <div class="auth-body">
        <div class="auth-field"><label>Username</label><div id="statUsername"></div></div>
        <div class="auth-field"><label>Wins</label><div id="statWins"></div></div>
        <div class="auth-field"><label>Losses</label><div id="statLosses"></div></div>
        <div class="auth-field"><label>Total Won</label><div id="statTotalWon"></div></div>
        <div class="auth-field"><label>Total Lost</label><div id="statTotalLost"></div></div>
        <div class="auth-field"><label>Total Boards Cleared</label><div id="statBoardsCleared"></div></div>
        <div class="auth-field"><label>Total Profit</label><div id="statTotalProfit"></div></div>
        <div class="auth-actions">
          <button id="closeAnalytics" class="btn outline">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin modal (owner 'jasem' only) -->
  <div id="adminModal" class="auth-modal" aria-hidden="true">
    <div class="auth-box">
      <h2>Admin Panel</h2>
      <div class="auth-body">
        <div class="auth-field"><label>Select User</label>
          <select id="adminUserSelect"></select>
        </div>
        <div class="auth-field"><label>Balance</label><input id="adminBalanceInput" type="number"></div>
        <div class="auth-actions"><button id="adminSetBalance" class="btn secondary">Set Balance</button></div>

        <div class="auth-field"><label>Ban (minutes)</label><input id="adminBanMinutes" type="number" min="1" placeholder="Minutes"></div>
        <div class="auth-actions"><button id="adminBanBtn" class="btn outline">Ban</button> <button id="adminUnbanBtn" class="btn outline">Unban</button></div>

        <div class="auth-field"><label>Reset Password (temp)</label><input id="adminResetPwd" type="text" placeholder="new password"></div>
        <div class="auth-actions"><button id="adminResetBtn" class="btn outline">Reset Password</button></div>

        <div class="auth-field"><label>Force Logout</label><div><button id="adminForceLogoutBtn" class="btn outline">Force Logout User</button></div></div>

        <div class="auth-field"><label>Admin Audit Log</label><div id="adminAuditLog" style="max-height:120px;overflow:auto;padding:8px;background:linear-gradient(180deg,#061420,#051218);border-radius:8px;margin-top:6px;color:#dffaff"></div></div>
        <div class="auth-actions"><button id="closeAdmin" class="btn outline">Close</button></div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <button id="dailyBtn" class="btn secondary">Claim Daily</button>
  <small>Made for fun — all coins are fake</small>
</footer>

<script src="script.js"></script>
</body>
